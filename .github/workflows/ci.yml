name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TEST_DATABASE_URL: postgres://turtleherder:turtleherder@localhost:5432/turtleherder_test

jobs:
  test:
    name: Typecheck, build, unit & integration
    runs-on: ubuntu-latest
    services:
      postgres:
        # Service containers start before checkout, so docker/create-test-db.sql
        # can't be mounted; POSTGRES_DB creates turtleherder_test directly.
        image: postgres:17-alpine
        env:
          POSTGRES_USER: turtleherder
          POSTGRES_PASSWORD: turtleherder
          POSTGRES_DB: turtleherder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: turtleherder
          POSTGRES_PASSWORD: turtleherder
          POSTGRES_DB: turtleherder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @turtleherder/e2e exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: e2e/test-results/
          retention-days: 7
