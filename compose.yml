services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: turtleherder
      POSTGRES_PASSWORD: turtleherder
      POSTGRES_DB: turtleherder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/create-test-db.sql:/docker-entrypoint-initdb.d/create-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turtleherder"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
